name: Django CI/CD

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  test:
    name: Test Django
    runs-on: self-hosted

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stepora_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 16379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements/production.txt
          pip install -r requirements/testing.txt

      - name: Run migrations
        env:
          DB_NAME: stepora_test
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: "15432"
          REDIS_URL: redis://localhost:16379
          SECRET_KEY: test-secret-key
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
          DEBUG: 'True'
        run: |
          source .venv/bin/activate
          mkdir -p logs
          python manage.py migrate

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DB_NAME: stepora_test
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: "15432"
          REDIS_URL: redis://localhost:16379
          SECRET_KEY: test-secret-key
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
          DEBUG: 'True'
        run: |
          source .venv/bin/activate
          pytest --override-ini="addopts=" --cov=. --cov-report=xml --cov-report=html -v

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: backend
          name: django-coverage

  lint:
    name: Lint Django
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Create venv and install linters
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install black isort flake8
      - name: Check Black formatting
        run: |
          source .venv/bin/activate
          black --check --exclude='migrations|venv' .
      - name: Check isort imports
        run: |
          source .venv/bin/activate
          isort --check-only --skip-glob='*/migrations/*' --profile black .
      - name: Run Flake8
        run: |
          source .venv/bin/activate
          flake8 .

  build:
    name: Build Docker
    runs-on: self-hosted
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --build-arg FIELD_ENCRYPTION_KEY="${{ secrets.FIELD_ENCRYPTION_KEY }}" -t stepora:${{ github.sha }} .

      - name: Save Docker image
        run: |
          docker save stepora:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: |
          gunzip -c image.tar.gz | docker load

      - name: Deploy notification
        run: |
          echo "Deployment would happen here"
          echo "Image: stepora:${{ github.sha }}"
