name: Django CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/django-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Test Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dreamplanner_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run migrations
        working-directory: backend
        env:
          DB_NAME: dreamplanner_test
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
        run: python manage.py migrate

      - name: Run tests with coverage
        working-directory: backend
        env:
          DB_NAME: dreamplanner_test
          DB_USER: test
          DB_PASSWORD: test
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key
          DEBUG: 'True'
        run: pytest --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: django-coverage

  lint:
    name: Lint Django
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run Black
        working-directory: backend
        run: black --check .

      - name: Run isort
        working-directory: backend
        run: isort --check-only .

      - name: Run Flake8
        working-directory: backend
        run: flake8 .

      - name: Run MyPy (type check)
        working-directory: backend
        run: mypy . --ignore-missing-imports || true

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t dreamplanner-backend:${{ github.sha }} .

      - name: Save Docker image
        run: |
          docker save dreamplanner-backend:${{ github.sha }} | gzip > backend-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image
          path: backend-image.tar.gz
          retention-days: 1

  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: backend-docker-image

      - name: Load Docker image
        run: |
          gunzip -c backend-image.tar.gz | docker load

      # Add your deployment steps here (e.g., push to registry, deploy to cloud)
      - name: Deploy notification
        run: |
          echo "Deployment would happen here"
          echo "Image: dreamplanner-backend:${{ github.sha }}"
