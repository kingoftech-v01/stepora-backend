name: Deploy Backend

on:
  push:
    branches: [main, development]
    paths-ignore:
      - ".github/workflows/deploy-frontend.yml"
      - "stepora-frontend/**"

env:
  AWS_REGION: eu-west-3

jobs:
  # ------------------------------------------------------------------
  # 1. Lint & sanity-check the Django project
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/production.txt

      - name: Install dependencies
        run: pip install -r requirements/production.txt

      - name: Compile check (syntax errors)
        run: python -m py_compile manage.py

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'ci-test-key-not-for-production' }}
          ALLOWED_HOSTS: localhost
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
          DB_NAME: ":memory:"
        run: |
          mkdir -p logs
          python manage.py check

  # ------------------------------------------------------------------
  # 2. Build Docker image and push to ECR
  # ------------------------------------------------------------------
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}"
          docker build \
            --build-arg REQUIREMENTS_FILE=requirements/production.txt \
            --build-arg DJANGO_SETTINGS=config.settings.production \
            --build-arg FIELD_ENCRYPTION_KEY="${{ secrets.FIELD_ENCRYPTION_KEY }}" \
            -t "${FULL_IMAGE}:${IMAGE_TAG}" \
            -t "${FULL_IMAGE}:latest" \
            .
          docker push "${FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${FULL_IMAGE}:latest"

  # ------------------------------------------------------------------
  # 3. Run migrations via a one-off ECS task
  # ------------------------------------------------------------------
  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migrations via ECS run-task
        env:
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          ECS_TASK_DEF: ${{ secrets.ECS_TASK_DEFINITION }}
        run: |
          # Get network config from the running service
          NET_CONFIG=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].networkConfiguration' \
            --output json)

          # Start a one-off migration task
          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition "${ECS_TASK_DEF}" \
            --overrides '{
              "containerOverrides": [{
                "name": "backend",
                "command": ["python", "manage.py", "migrate", "--noinput"]
              }]
            }' \
            --launch-type FARGATE \
            --network-configuration "${NET_CONFIG}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: ${TASK_ARN}"

          # Wait for the task to finish
          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}"

          # Verify exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "::error::Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi
          echo "Migrations completed successfully"

  # ------------------------------------------------------------------
  # 4. Deploy new image to ECS service
  # ------------------------------------------------------------------
  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register new task definition and update service
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          # Get the current task definition from the running service
          CURRENT_TD=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].taskDefinition' \
            --output text)

          # Fetch it, swap the image, strip read-only fields, write to file
          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TD}" \
            --query 'taskDefinition' \
            | jq --arg IMG "${FULL_IMAGE}" \
              '.containerDefinitions[0].image = $IMG
               | del(.taskDefinitionArn, .revision, .status,
                     .requiresAttributes, .compatibilities,
                     .registeredAt, .registeredBy)' \
            > /tmp/new-task-def.json

          # Register new revision
          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "New task definition: ${NEW_TD_ARN}"

          # Update the service with the new revision
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TD_ARN}" \
            --force-new-deployment

          # Wait for rolling deployment to stabilize
          echo "Waiting for service stability..."
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

          echo "Deployment complete"
