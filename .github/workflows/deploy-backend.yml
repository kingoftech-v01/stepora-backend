name: Deploy Backend

on:
  push:
    branches: [main, development]
    paths-ignore:
      - ".github/workflows/deploy-frontend.yml"
      - "stepora-frontend/**"
  pull_request:
    branches: [main, development]

env:
  AWS_REGION: eu-west-3

jobs:
  # ------------------------------------------------------------------
  # 1. Lint & sanity-check the Django project
  # ------------------------------------------------------------------
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create venv and install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -r requirements/production.txt

      - name: Compile check (syntax errors)
        run: |
          source .venv/bin/activate
          python -m py_compile manage.py

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'ci-test-key-not-for-production' }}
          ALLOWED_HOSTS: localhost
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
          DB_NAME: ":memory:"
        run: |
          source .venv/bin/activate
          mkdir -p logs
          python manage.py check

  # ------------------------------------------------------------------
  # 2. Build Docker image and push to ECR
  # ------------------------------------------------------------------
  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}"
          docker build \
            --build-arg REQUIREMENTS_FILE=requirements/production.txt \
            --build-arg DJANGO_SETTINGS=config.settings.production \
            --build-arg FIELD_ENCRYPTION_KEY="${{ secrets.FIELD_ENCRYPTION_KEY }}" \
            -t "${FULL_IMAGE}:${IMAGE_TAG}" \
            -t "${FULL_IMAGE}:latest" \
            .
          docker push "${FULL_IMAGE}:${IMAGE_TAG}"
          docker push "${FULL_IMAGE}:latest"

  # ------------------------------------------------------------------
  # 3. Deploy new image to ECS service
  #    Migrations run automatically via entrypoint.sh on container start
  # ------------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Deploy all backend services (web + celery + celery-beat)
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPO: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          declare -A ROLES=(
            [stepora-backend]=web
            [stepora-celery]=worker
            [stepora-celery-beat]=beat
          )

          for SERVICE_NAME in stepora-backend stepora-celery stepora-celery-beat; do
            echo "=== Deploying ${SERVICE_NAME} (role: ${ROLES[$SERVICE_NAME]}) ==="
            ROLE="${ROLES[$SERVICE_NAME]}"

            CURRENT_TD=$(aws ecs describe-services \
              --cluster "${ECS_CLUSTER}" \
              --services "${SERVICE_NAME}" \
              --query 'services[0].taskDefinition' \
              --output text)

            aws ecs describe-task-definition \
              --task-definition "${CURRENT_TD}" \
              --query 'taskDefinition' \
              | jq --arg IMG "${FULL_IMAGE}" --arg ROLE "${ROLE}" \
                '.containerDefinitions[0].image = $IMG
                 | .containerDefinitions[0].command = []
                 | if (.containerDefinitions[0].environment | map(select(.name == "CONTAINER_ROLE")) | length) == 0
                   then .containerDefinitions[0].environment += [{"name": "CONTAINER_ROLE", "value": $ROLE}]
                   else .containerDefinitions[0].environment = [.containerDefinitions[0].environment[] | if .name == "CONTAINER_ROLE" then .value = $ROLE else . end]
                   end
                 | del(.taskDefinitionArn, .revision, .status,
                       .requiresAttributes, .compatibilities,
                       .registeredAt, .registeredBy)' \
              > /tmp/new-task-def.json

            NEW_TD_ARN=$(aws ecs register-task-definition \
              --cli-input-json file:///tmp/new-task-def.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
            echo "New task definition: ${NEW_TD_ARN}"

            aws ecs update-service \
              --cluster "${ECS_CLUSTER}" \
              --service "${SERVICE_NAME}" \
              --task-definition "${NEW_TD_ARN}" \
              --force-new-deployment
          done

          echo "Waiting for all services to stabilize..."
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services stepora-backend stepora-celery stepora-celery-beat

          echo "All services deployed successfully"
