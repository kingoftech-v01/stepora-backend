[pytest]
# Django settings module
DJANGO_SETTINGS_MODULE = config.settings.development

# Python files
python_files = tests.py test_*.py *_tests.py tests_*.py

# Python classes
python_classes = Test*

# Python functions
python_functions = test_*

# Test paths
testpaths = apps core integrations tests

# Add current directory to Python path
pythonpath = .

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    asyncio: marks tests as async tests

# Output options
addopts =
    --strict-markers
    --tb=short
    --cov=apps
    --cov=core
    --cov=integrations
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=84
    --cov-config=.coveragerc
    -v
    -ra
    --durations=10

# Coverage options
[coverage:run]
source = apps,core,integrations
omit =
    */migrations/*
    */tests.py
    */test_*.py
    */tests_*.py
    */__pycache__/*
    */venv/*
    */env/*
    manage.py
    config/wsgi.py
    config/asgi.py
    */management/commands/*
    */consumers.py
    */routing.py
    */tasks.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    def __str__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
