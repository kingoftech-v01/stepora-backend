<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame -->
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F9FAFB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#F9FAFB" rx="40"/>

  <!-- Status Bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="187" y="28" font-family="SF Pro, Arial" font-size="14" font-weight="600" text-anchor="middle" fill="#1F2937">9:41</text>

  <!-- Header -->
  <rect y="44" width="375" height="60" fill="#FFFFFF"/>
  <text x="24" y="82" font-family="SF Pro, Arial" font-size="24" font-weight="700" fill="#1F2937">DreamPlanner</text>
  <circle cx="340" cy="74" r="18" fill="url(#primaryGradient)"/>
  <text x="340" y="79" font-family="SF Pro, Arial" font-size="20" font-weight="600" text-anchor="middle" fill="#FFFFFF">+</text>

  <!-- Chat Messages Area -->
  <rect x="16" y="120" width="343" height="520" fill="#FFFFFF" rx="16"/>

  <!-- AI Message Bubble -->
  <rect x="24" y="136" width="280" height="120" fill="#F3E8FF" rx="16"/>
  <circle cx="44" cy="156" r="16" fill="url(#primaryGradient)"/>
  <text x="44" y="161" font-family="SF Pro, Arial" font-size="14" text-anchor="middle" fill="#FFFFFF">AI</text>
  <text x="70" y="156" font-family="SF Pro, Arial" font-size="12" fill="#6B7280">DreamPlanner</text>
  <text x="32" y="180" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">Bonjour ! 👋 Je suis ton assistant</text>
  <text x="32" y="198" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">personnel pour réaliser tes rêves.</text>
  <text x="32" y="224" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">Quel est ton prochain grand</text>
  <text x="32" y="242" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">objectif ?</text>

  <!-- User Message Bubble -->
  <rect x="80" y="280" width="260" height="60" fill="url(#primaryGradient)" rx="16"/>
  <text x="96" y="308" font-family="SF Pro, Arial" font-size="14" fill="#FFFFFF">Je veux apprendre à jouer</text>
  <text x="96" y="326" font-family="SF Pro, Arial" font-size="14" fill="#FFFFFF">de la guitare 🎸</text>

  <!-- AI Response -->
  <rect x="24" y="360" width="300" height="140" fill="#F3E8FF" rx="16"/>
  <text x="32" y="388" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">Super choix ! La guitare est un</text>
  <text x="32" y="406" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">instrument gratifiant. 🎵</text>
  <text x="32" y="432" font-family="SF Pro, Arial" font-size="14" fill="#1F2937">Quelques questions :</text>
  <text x="32" y="456" font-family="SF Pro, Arial" font-size="13" fill="#6B7280">• As-tu déjà une guitare ?</text>
  <text x="32" y="474" font-family="SF Pro, Arial" font-size="13" fill="#6B7280">• Combien de temps par jour ?</text>
  <text x="32" y="492" font-family="SF Pro, Arial" font-size="13" fill="#6B7280">• Date cible en tête ?</text>

  <!-- Quick Suggestions -->
  <rect x="24" y="520" width="140" height="36" fill="#E9D5FF" rx="18"/>
  <text x="94" y="543" font-family="SF Pro, Arial" font-size="12" text-anchor="middle" fill="#7C3AED">Oui j'ai une guitare</text>

  <rect x="172" y="520" width="120" height="36" fill="#E9D5FF" rx="18"/>
  <text x="232" y="543" font-family="SF Pro, Arial" font-size="12" text-anchor="middle" fill="#7C3AED">30 min/jour</text>

  <rect x="24" y="564" width="100" height="36" fill="#E9D5FF" rx="18"/>
  <text x="74" y="587" font-family="SF Pro, Arial" font-size="12" text-anchor="middle" fill="#7C3AED">En 6 mois</text>

  <!-- Input Area -->
  <rect x="16" y="656" width="343" height="56" fill="#FFFFFF" rx="28" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="690" font-family="SF Pro, Arial" font-size="14" fill="#9CA3AF">Écris ton message...</text>
  <circle cx="330" cy="684" r="20" fill="url(#primaryGradient)"/>
  <path d="M324 684 L336 684 M330 678 L330 690" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom Navigation -->
  <rect y="732" width="375" height="80" fill="#FFFFFF"/>
  <line x1="0" y1="732" x2="375" y2="732" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Nav Items -->
  <g transform="translate(47, 752)">
    <circle cx="0" cy="0" r="24" fill="#F3E8FF"/>
    <text x="0" y="5" font-family="SF Pro, Arial" font-size="20" text-anchor="middle">💬</text>
    <text x="0" y="40" font-family="SF Pro, Arial" font-size="10" text-anchor="middle" fill="#8B5CF6" font-weight="600">Chat</text>
  </g>

  <g transform="translate(140, 752)">
    <text x="0" y="5" font-family="SF Pro, Arial" font-size="20" text-anchor="middle">📅</text>
    <text x="0" y="40" font-family="SF Pro, Arial" font-size="10" text-anchor="middle" fill="#6B7280">Calendrier</text>
  </g>

  <g transform="translate(235, 752)">
    <text x="0" y="5" font-family="SF Pro, Arial" font-size="20" text-anchor="middle">🎯</text>
    <text x="0" y="40" font-family="SF Pro, Arial" font-size="10" text-anchor="middle" fill="#6B7280">Rêves</text>
  </g>

  <g transform="translate(328, 752)">
    <text x="0" y="5" font-family="SF Pro, Arial" font-size="20" text-anchor="middle">👤</text>
    <text x="0" y="40" font-family="SF Pro, Arial" font-size="10" text-anchor="middle" fill="#6B7280">Profil</text>
  </g>

  <!-- Home Indicator -->
  <rect x="140" y="800" width="95" height="5" fill="#1F2937" rx="2.5"/>
</svg>
