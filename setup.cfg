[flake8]
max-line-length = 120
exclude =
    migrations,
    venv,
    .venv,
    __pycache__,
    manage.py,
    node_modules
extend-ignore =
    E203,
    E402,
    E501,
    F403,
    F405,
    W503
per-file-ignores =
    config/settings/*.py:F401,F405,E501
    */tests*.py:F841,F401
    */test_*.py:F841,F401

[isort]
profile = black
skip_glob = */migrations/*
known_third_party = django,rest_framework,celery

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests.py test_*.py
