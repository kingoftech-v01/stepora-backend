name: dreamplanner
description: AI-powered goal achievement platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  # HTTP client
  dio: ^5.9.0
  # Navigation
  go_router: ^17.1.0
  # UI
  google_fonts: ^8.0.1
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  # Storage
  shared_preferences: ^2.5.0
  flutter_secure_storage: ^10.0.0
  # Calendar
  table_calendar: ^3.2.0
  # Notifications
  flutter_local_notifications: ^20.0.0
  # WebSocket
  web_socket_channel: ^3.0.3
  # Utils
  equatable: ^2.0.7
  json_annotation: ^4.10.0
  intl: ^0.20.2
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  # Image picker
  image_picker: ^1.2.1
  # Social auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.0
  json_serializable: ^6.12.0
  riverpod_generator: ^4.0.3
  mockito: ^5.6.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
