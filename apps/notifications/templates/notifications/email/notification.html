{% load i18n %}<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 32px 24px; text-align: center; }
        .header h1 { color: #ffffff; font-size: 20px; margin: 0; font-weight: 600; }
        .content { padding: 32px 24px; }
        .greeting { color: #374151; font-size: 16px; margin-bottom: 16px; }
        .body-text { color: #4b5563; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
        .btn { display: inline-block; background: #6366f1; color: #ffffff; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; font-size: 14px; }
        .footer { padding: 20px 24px; text-align: center; color: #9ca3af; font-size: 12px; border-top: 1px solid #f3f4f6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title }}</h1>
        </div>
        <div class="content">
            <p class="greeting">{% trans "Hi" %} {{ user_name }},</p>
            <p class="body-text">{{ body }}</p>
            <p><a href="{{ action_url }}" class="btn">{% trans "Open DreamPlanner" %}</a></p>
        </div>
        <div class="footer">
            <p>{% trans "DreamPlanner" %} &mdash; {% trans "Turn your dreams into reality" %}</p>
            <p>{% trans "You can manage notification preferences in your profile settings." %}</p>
        </div>
    </div>
</body>
</html>
