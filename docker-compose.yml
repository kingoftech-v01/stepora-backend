version: '3.8'

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: dreamplanner_db
    environment:
      POSTGRES_DB: dreamplanner
      POSTGRES_USER: dreamplanner
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamplanner"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: dreamplanner_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # Elasticsearch for full-text search on encrypted fields
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: dreamplanner_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Django web application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
    container_name: dreamplanner_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 300 --access-logfile - config.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=dreamplanner
      - DB_USER=dreamplanner
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ALLOWED_HOSTS=dpapi.jhpetitfrere.com,dp.jhpetitfrere.com,localhost,127.0.0.1
      - CORS_ORIGIN=https://dp.jhpetitfrere.com,https://localhost,capacitor://localhost
      - CSRF_TRUSTED_ORIGINS=https://dp.jhpetitfrere.com,https://localhost,capacitor://localhost
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ELASTICSEARCH_URL=http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery worker for background tasks
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
    container_name: dreamplanner_celery
    command: celery -A config worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=dreamplanner
      - DB_USER=dreamplanner
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ELASTICSEARCH_URL=http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=dpapi.jhpetitfrere.com,dp.jhpetitfrere.com,localhost,127.0.0.1
    depends_on:
      - db
      - redis
      - web
      - elasticsearch
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # Celery beat for scheduled tasks
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
    container_name: dreamplanner_celery_beat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=dreamplanner
      - DB_USER=dreamplanner
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=dpapi.jhpetitfrere.com,dp.jhpetitfrere.com,localhost,127.0.0.1
    depends_on:
      - db
      - redis
      - celery
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Daphne for WebSocket support (Channels)
  daphne:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
    container_name: dreamplanner_daphne
    command: daphne -b 0.0.0.0 -p 9000 config.asgi:application
    volumes:
      - .:/app
    expose:
      - "9000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=dreamplanner
      - DB_USER=dreamplanner
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=dpapi.jhpetitfrere.com,dp.jhpetitfrere.com,localhost,127.0.0.1
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Internal nginx — security headers, gzip, rate limiting, static/media
  nginx:
    image: nginx:1.27-alpine
    container_name: dreamplanner_nginx
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
    depends_on:
      - web
      - daphne
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  static_volume:
  media_volume:

networks:
  default:
    name: dreamplanner_network
