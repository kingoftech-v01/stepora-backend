services:
  # PostgreSQL database (data network only — Vuln 725 network segmentation)
  db:
    image: postgres:15-alpine
    container_name: stepora_db
    environment:
      POSTGRES_DB: stepora
      POSTGRES_USER: stepora
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stepora"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Redis for caching and Celery broker (data network only)
  redis:
    image: redis:7-alpine
    container_name: stepora_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # Elasticsearch for full-text search on encrypted fields (data network only)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: stepora_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Django web application (app + data networks)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
        FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    container_name: stepora_web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_leagues &&
             python manage.py seed_dream_templates &&
             python manage.py shell -c 'from apps.leagues.models import SeasonConfig; SeasonConfig.get(); print(\"SeasonConfig ready\")' &&
             python manage.py ensure_search_index &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 300 --access-logfile - config.wsgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    networks:
      - app
      - data
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=stepora
      - DB_USER=stepora
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ELASTICSEARCH_URL=http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_ADMIN_EMAIL=${VAPID_ADMIN_EMAIL:-admin@stepora.app}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Celery worker for background tasks (app + data networks)
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
        FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    container_name: stepora_celery
    volumes:
      - .:/app
    networks:
      - app
      - data
    environment:
      - CONTAINER_ROLE=worker
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=stepora
      - DB_USER=stepora
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ELASTICSEARCH_URL=http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_ADMIN_EMAIL=${VAPID_ADMIN_EMAIL:-admin@stepora.app}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - db
      - redis
      - web
      - elasticsearch
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10 2>/dev/null | grep -q OK || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Celery beat for scheduled tasks (app + data networks)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
        FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    container_name: stepora_celery_beat
    volumes:
      - .:/app
    networks:
      - app
      - data
    environment:
      - CONTAINER_ROLE=beat
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=stepora
      - DB_USER=stepora
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-service-account.json
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    depends_on:
      - db
      - redis
      - celery
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid) 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # Daphne for WebSocket support (Channels) — (app + data networks)
  daphne:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/production.txt
        DJANGO_SETTINGS: config.settings.production
        FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
    container_name: stepora_daphne
    command: daphne -b 0.0.0.0 -p 9000 config.asgi:application
    volumes:
      - .:/app
    expose:
      - "9000"
    networks:
      - app
      - data
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DB_HOST=db
      - DB_NAME=stepora
      - DB_USER=stepora
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SSLMODE=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_HOST=redis
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - AGORA_APP_ID=${AGORA_APP_ID:-}
      - AGORA_APP_CERTIFICATE=${AGORA_APP_CERTIFICATE:-}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_ADMIN_EMAIL=${VAPID_ADMIN_EMAIL:-admin@stepora.app}
    depends_on:
      - db
      - redis
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/ || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Internal nginx — security headers, gzip, rate limiting, static/media
  # (app network only — cannot reach DB/Redis directly, Vuln 725)
  nginx:
    image: nginx:1.27-alpine
    container_name: stepora_nginx
    ports:
      - "127.0.0.1:8085:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/mediafiles:ro
    networks:
      - app
    depends_on:
      - web
      - daphne
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  static_volume:
  media_volume:

# Network segmentation (Vuln 725): separate data-tier from app-tier.
# nginx (app only) cannot reach db/redis/elasticsearch directly.
networks:
  app:
    name: stepora_app
  data:
    name: stepora_data
    internal: true
